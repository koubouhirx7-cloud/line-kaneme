<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お問い合わせ - 配送受付</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
        .success-anim { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white text-gray-800 p-4 shadow-sm flex items-center justify-center sticky top-0 z-10 border-b">
        <h1 class="font-bold text-lg">お問い合わせフォーム</h1>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto p-5" id="mainContainer">
        
        <!-- STEP 1: Input Form -->
        <div id="formScreen">
            <form id="inquiryForm" onsubmit="showConfirm(event)">
                <div class="mb-4">
                    <label class="block font-bold text-gray-700 text-[13px] mb-1.5">顧客名 <span class="text-red-500 text-[10px] ml-1">必須</span></label>
                    <input type="text" id="custName" required class="w-full bg-white text-gray-800 border-2 border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="山田　太郎">
                </div>

                <div class="mb-4">
                    <label class="block font-bold text-gray-700 text-[13px] mb-1.5">電話番号 <span class="text-red-500 text-[10px] ml-1">必須</span></label>
                    <input type="tel" id="custPhone" oninput="this.value = toHalfWidth(this.value)" required class="w-full bg-white text-gray-800 border-2 border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="例: 090-1234-5678">
                </div>

                <div class="mb-4">
                    <label class="block font-bold text-gray-700 text-[13px] mb-1.5">ご住所 <span class="text-red-500 text-[10px] ml-1">必須</span></label>
                    <div class="flex gap-2 mb-2">
                        <input type="tel" id="zipFrom" oninput="this.value = toHalfWidth(this.value)" class="w-7/12 bg-white text-gray-800 border-2 border-gray-200 rounded-lg p-2.5 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="郵便番号 (例: 1000001)">
                        <button type="button" onclick="searchAddress('zipFrom', 'custFrom')" class="w-5/12 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 rounded-lg text-[13px] border border-gray-300 transition-colors flex items-center justify-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>住所検索</button>
                    </div>
                    <input type="text" id="custFrom" oninput="this.value = toHalfWidth(this.value)" required class="w-full bg-white text-gray-800 border-2 border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="例: 東京都千代田区〜">
                </div>

                <div class="mb-4">
                    <label class="block font-bold text-gray-700 text-[13px] mb-1.5">お荷物番号 <span class="text-gray-400 text-[10px] ml-1">任意</span></label>
                    <input type="text" id="custTo" oninput="this.value = toHalfWidth(this.value)" class="w-full bg-white text-gray-800 border-2 border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="例: 1234-5678-9012">
                </div>

                <div class="mb-8">
                    <label class="block font-bold text-gray-700 text-[13px] mb-1.5">お問い合わせ内容・ご要望 <span class="text-red-500 text-[10px] ml-1">必須</span></label>
                    <textarea id="custDetail" required rows="3" class="w-full bg-white text-gray-800 border-2 border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 transition-colors resize-none" placeholder="例: 明日の午前中に到着時間の事前電話をお願いします。"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] transition-all active:scale-95 text-base flex items-center justify-center gap-2">
                    入力内容を確認する
                </button>
            </form>
        </div>

        <!-- STEP 2: Confirmation Screen (Hidden initially) -->
        <div id="confirmScreen" class="hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">ご入力内容の確認</h2>
            <p class="text-sm text-gray-600 mb-6">以下の内容で送信します。よろしいですか？</p>

            <div class="bg-white rounded-lg border border-gray-200 p-4 mb-6 space-y-4 shadow-sm">
                <div>
                    <p class="text-[11px] text-gray-500 font-bold mb-1">顧客名</p>
                    <p class="text-sm text-gray-800 font-medium" id="confName">-</p>
                </div>
                <div>
                    <p class="text-[11px] text-gray-500 font-bold mb-1">電話番号</p>
                    <p class="text-sm text-gray-800 font-medium" id="confPhone">-</p>
                </div>
                <div>
                    <p class="text-[11px] text-gray-500 font-bold mb-1">ご住所</p>
                    <p class="text-sm text-gray-800 font-medium" id="confFrom">-</p>
                </div>
                <div>
                    <p class="text-[11px] text-gray-500 font-bold mb-1">お荷物番号 (任意)</p>
                    <p class="text-sm text-gray-800 font-medium" id="confTo">-</p>
                </div>
                <div>
                    <p class="text-[11px] text-gray-500 font-bold mb-1">お問い合わせ内容・ご要望</p>
                    <p class="text-sm text-gray-800 font-medium bg-gray-50 p-2 rounded mt-1 whitespace-pre-wrap" id="confDetail">-</p>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="executeSubmit()" class="w-full bg-[#06C755] hover:bg-green-600 text-white font-bold py-3.5 rounded-xl shadow-[0_4px_14px_0_rgba(6,199,85,0.39)] transition-all active:scale-95 text-base flex items-center justify-center gap-2">
                    この内容で送信する
                </button>
                <button onclick="backToForm()" class="w-full bg-white border-2 border-gray-300 text-gray-600 font-bold py-3.5 rounded-xl hover:bg-gray-50 transition-all active:scale-95 text-base">
                    入力画面へ戻る
                </button>
            </div>
        </div>

    </main>

    <!-- STEP 3: Success Screen (Hidden initially) -->
    <div id="successScreen" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mb-6 success-anim relative">
            <svg class="w-12 h-12 text-[#06C755] absolute z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            <div class="absolute inset-0 border-4 border-[#06C755] rounded-full opacity-20 scale-150 animate-ping"></div>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-3">送信完了いたしました！</h2>
        <p class="text-gray-600 text-sm mb-8 leading-relaxed bg-gray-50 p-4 rounded-lg">お問い合わせありがとうございます。<br>手配が進行次第、追ってご連絡いたします。<br><br>恐れ入りますが、この画面を閉じてLINEのトークルームにお戻りください。</p>
        <button onclick="closeAppBrowser()" class="bg-[#06C755] text-white font-bold py-3.5 px-10 rounded-full shadow-lg text-sm cursor-pointer hover:bg-green-600 active:scale-95 transition-all">LINEトークへ戻る</button>
    </div>

    <!-- Spinner (Hidden initially) -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-40 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-200 border-t-blue-600 mb-4"></div>
        <p class="text-gray-600 font-bold text-sm">送信中...</p>
    </div>

    <script>
        // 全角英数字を半角に変換するユーティリティ関数
        function toHalfWidth(str) {
            return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
            }).replace(/[−－]/g, '-');
        }

        // 郵便番号から住所を検索する
        async function searchAddress(zipInputId, targetAddressId) {
            let zip = document.getElementById(zipInputId).value.replace(/[^0-9]/g, '');
            if (zip.length !== 7) {
                alert("郵便番号はハイフンなしの7桁の数字で入力してください。");
                return;
            }
            
            const btn = document.querySelector(`button[onclick="searchAddress('${zipInputId}', '${targetAddressId}')"]`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="animate-spin w-4 h-4 border-2 border-gray-400 border-t-current rounded-full"></div> 検索中...';
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.zipaddress.net/?zipcode=${zip}`);
                const data = await response.json();
                
                if (data.code === 200 && data.data) {
                    
                    // 現在の入力値がある場合は上書き確認をするか、あるいは単に追記するか
                    // 今回はシンプルに上書きします（元々入っていればクリアして上書き）
                    document.getElementById(targetAddressId).value = data.data.fullAddress;
                } else {
                    alert("該当する住所が見つかりませんでした。郵便番号をご確認ください。");
                }
            } catch (error) {
                console.error("Address search error:", error);
                alert("住所検索APIの通信に失敗しました。");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function closeAppBrowser() {
            // Attempt to close the window normally
            window.open('','_self').close();
            
            // If it doesn't close within 500ms
            setTimeout(() => {
                alert("恐れ入りますが、画面上の「✕」や「完了」ボタンを押してLINEのトークルームにお戻りください。");
            }, 300);
        }

        // 1. 確認画面を表示する
        function showConfirm(e) {
            e.preventDefault();
            
            // フォームの値を反映
            document.getElementById('confName').innerText = document.getElementById('custName').value;
            document.getElementById('confPhone').innerText = document.getElementById('custPhone').value;
            document.getElementById('confFrom').innerText = document.getElementById('custFrom').value;
            document.getElementById('confTo').innerText = document.getElementById('custTo').value.trim() || '未入力';
            document.getElementById('confDetail').innerText = document.getElementById('custDetail').value;
            
            // 画面切り替え (Form -> Confirm)
            document.getElementById('formScreen').classList.add('hidden');
            document.getElementById('confirmScreen').classList.remove('hidden');
            window.scrollTo(0, 0); // 上までスクロール
        }

        // 2. 入力画面に戻る
        function backToForm() {
            document.getElementById('formScreen').classList.remove('hidden');
            document.getElementById('confirmScreen').classList.add('hidden');
        }

        // 3. 実際にAPIへ送信する
        async function executeSubmit() {
            const cName = document.getElementById('custName').value;
            const cPhone = document.getElementById('custPhone').value;
            const cFrom = document.getElementById('custFrom').value;
            const dataTo = document.getElementById('custTo').value.trim() || '未入力';
            const cDetail = document.getElementById('custDetail').value;

            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden'); // スピナー表示

            try {
                // Vercel上のAPIエンドポイントに合わせる
                const API_BASE = window.location.origin + '/api';
                
                const response = await fetch(`${API_BASE}/inquiries`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        customer_name: cName,
                        phone_number: cPhone,
                        pickup_location: cFrom,
                        delivery_location: dataTo === '未入力' ? null : dataTo,
                        detail: cDetail
                    })
                });

                if (!response.ok) {
                    let errBody = '';
                    try { errBody = await response.text(); } catch(_) {}
                    const err = new Error(`HTTP ${response.status}`);
                    err._responseBody = errBody;
                    throw err;
                }

                // 成功したら画面切り替え (Confirm -> Success)
                overlay.classList.add('hidden');
                document.getElementById('mainContainer').classList.add('hidden');
                document.getElementById('successScreen').classList.remove('hidden');

            } catch (error) {
                console.error("Submission error:", error);
                overlay.classList.add('hidden');

                let detail = error.message || '不明なエラー';
                // responseがあれば本文も読む
                if (error._responseBody) {
                    detail += `\n\u30b5ーバー詳細: ${error._responseBody}`;
                }
                alert(`送信に失敗しました。\n${detail}\n\n通信環境をご確認の上、もう一度お試しください。`);
            }
        }
    </script>
</body>
</html>
