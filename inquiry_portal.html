<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ窓口</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: transparent; /* Allows seamless iframe embedding */
        }
    </style>
</head>
<body class="antialiased text-gray-800 bg-gray-50 flex items-center justify-center min-h-screen py-10 px-4">

    <!-- This container is designed to look good standalone or embedded in an iframe on an existing site -->
    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <!-- Header Banner -->
        <div class="bg-indigo-600 px-8 py-10 text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-indigo-700 opacity-50" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>
            <div class="relative z-10">
                <span class="inline-block py-1 px-3 rounded-full bg-indigo-500 text-indigo-100 text-xs font-bold tracking-widest mb-4">
                    CUSTOMER PORTAL
                </span>
                <h1 class="text-2xl md:text-3xl font-black text-white mb-2">
                    配送のお問い合わせ
                </h1>
                <p class="text-indigo-100 text-sm md:text-base">
                    以下のボタンからLINE公式アカウントへ進み、<br class="hidden md:block">トーク画面よりお問い合わせください。
                </p>
            </div>
        </div>

        <!-- Options Container -->
        <div class="p-8 md:p-12 space-y-6">
            
            <!-- Step Flow -->
            <div class="space-y-4">
                <!-- STEP 1 -->
                <div class="bg-white border-2 border-green-100 rounded-2xl p-6 shadow-sm relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-20 h-20 bg-green-50 rounded-full z-0"></div>
                    <div class="relative z-10 flex flex-col md:flex-row gap-4 items-start md:items-center">
                        <div class="flex-shrink-0 w-12 h-12 bg-[#06C755] text-white rounded-full flex items-center justify-center font-black text-xl shadow-md">1</div>
                        <div class="flex-1">
                            <h2 class="text-xl font-bold text-gray-900 mb-2">公式LINEを友だち追加</h2>
                            <p class="text-gray-600 text-sm leading-relaxed mb-4">
                                まずは以下のボタンから、当社のLINE公式アカウントを「友だち追加」してください。
                            </p>
                            <a href="https://lin.ee/u8H8AM4" target="_blank" class="inline-flex items-center justify-center w-full md:w-auto gap-2 bg-[#06C755] hover:bg-green-600 text-white font-bold py-3.5 px-8 rounded-full transition-all shadow-md active:scale-95 cursor-pointer">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M22.5 10.9c0-4.6-4.7-8.4-10.5-8.4S1.5 6.3 1.5 10.9c0 4.1 3.8 7.6 9.1 8.3 0.4 0.1 0.9 0.2 1 0.5 0.1 0.3 0 0.8-0.1 1.2-0.1 0.3-0.4 1.4-0.4 1.6-0.1 0.3-0.1 0.5 0.2 0.7 0.3 0.1 0.6 0.2 1 0 0.3-0.2 1.6-0.9 2.2-1.3 2-1.4 3.9-3.2 5.1-5.3 1.1-1.8 1.4-3.8 1.4-5.7z"/></svg>
                                友だち追加する
                            </a>
                        </div>
                    </div>
                </div>

                <!-- STEP 2 -->
                <div class="bg-white border-2 border-gray-100 rounded-2xl p-6 shadow-sm">
                    <div class="flex flex-col md:flex-row gap-4 items-start md:items-center">
                        <div class="flex-shrink-0 w-12 h-12 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center font-black text-xl">2</div>
                        <div class="flex-1">
                            <h2 class="text-xl font-bold text-gray-900 mb-2">トーク画面からメニューを開く</h2>
                            <p class="text-gray-600 text-sm leading-relaxed">
                                友だち追加後、トーク画面の下部に表示される<strong>「メニュー」</strong>から受付フォームを開き、必要事項を入力してお問い合わせください。
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="pt-6 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-400">
                    ※お預かりした個人情報は、配送手配およびご連絡の目的にのみ使用いたします。
                </p>
            </div>
            
        </div>
    </div>
    
</body>
</html>
